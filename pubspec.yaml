name: prompt_library
description: OSINT АРХІВ. Спеціальний інструментарій для збору та аналізу даних.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.3
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  exif: ^3.3.0
  archive: ^4.0.9
  intl: ^0.19.0
  permission_handler: ^11.3.1
  # СУВОРА ВЕРСІЯ: щоб не вимагати Android SDK 35
  flutter_pdfview: 1.3.1 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "icon.png" 
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png
