name: ss
description: OSINT toolkit for Ukrainian intelligence and security operations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Sensors (для магнітометра)
  sensors_plus: ^6.0.1
  
  # Storage & Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.0.0
  
  # File operations
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  
  # UI
  tutorial_coach_mark: '>=1.2.11 <1.3.0'
  
  # Permissions
  # (permission_handler видалено — не використовується)
  
  # Image processing
  flutter_pdfview: ^1.3.1
  exif: ^3.3.0
  flutter_tesseract_ocr: ^0.4.23
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#020B1A"
  adaptive_icon_foreground: "assets/icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/kyiv_night.jpg
    - assets/icon.png
    - assets/icon_fg.png
    - assets/splash.png
    - assets/phone_db.json
    - assets/tessdata/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
