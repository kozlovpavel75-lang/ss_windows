name: prompt_library
description: OSINT АРХІВ. Спеціальний інструментарій для збору та аналізу даних.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  file_picker: ^8.0.1
  share_plus: ^10.1.0
  path_provider: ^2.1.2
  flutter_pdfview: 1.3.1
  exif: ^3.1.4
  intl: ^0.19.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0 # Для відкриття дорків у браузері

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "icon.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png
