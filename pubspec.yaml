name: prompt_library
description: OSINT АРХІВ.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.3
  path: ^1.9.0
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  exif: ^3.3.0
  archive: ^4.0.9
  intl: ^0.19.0
  permission_handler: ^11.3.1
  # ЖОРСТКА ФІКСАЦІЯ ВЕРСІЇ (ЩОБ БІЛД НЕ ПАДАВ НА ANDROID 35)
  flutter_pdfview: 1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "icon.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
