name: ss
description: OSINT toolkit for Ukrainian intelligence and security operations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Storage & Database
  sqflite_common_ffi: ^2.3.3      # Windows-сумісний sqflite
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.0.0

  # File operations
  file_picker: ^8.0.0

  # UI
  tutorial_coach_mark: '>=1.2.11 <1.3.0'

  # Image processing
  exif: ^3.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/kyiv_night.jpg
    - assets/icon.png
    - assets/splash.png
    - assets/phone_db.json
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
