name: prompt_library
description: OSINT АРХІВ. Спеціальний інструментарій для збору та аналізу даних.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Збереження даних (промпти, налаштування, сейф)
  shared_preferences: ^2.3.3
  
  # Робота з файлами (TXT, PDF, DOCX)
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  
  # Поширення результатів
  share_plus: ^10.1.4
  
  # Перегляд PDF-документів
  flutter_pdfview: ^1.3.2
  
  # Аналіз метаданих зображень
  exif: ^3.3.0
  
  # Робота з архівами (необхідно для читання структури .docx)
  archive: ^4.0.9
  
  # Форматування дат та локалізація
  intl: ^0.19.0
  
  # Керування дозволами (пам'ять, камера)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Генератор іконок додатку
  flutter_launcher_icons: ^0.14.4

# Конфігурація іконки додатку
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon.png" # Переконайтеся, що файл icon.png лежить у папці assets
  min_sdk_size: 21

flutter:
  uses-material-design: true

  # Ресурси додатку
  assets:
    - assets/splash.png
